workflows:
  zigo-conductor-ios:
    name: Zigo Conductor iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zigotaxi.driver
      vars:
        APP_STORE_APPLE_ID: 6788506523
      flutter: stable
      xcode: latest
    scripts:
      - name: Prepare secrets file for CI
        script: |
          cp lib/utils/secrets.example.dart lib/utils/secrets.dart
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          rm -f ios/Flutter/Generated.xcconfig ios/Flutter/flutter_export_environment.sh
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod cache clean --all
          pod install --repo-update
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
